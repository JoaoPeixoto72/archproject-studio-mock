<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchProject - Gestão de Projectos de Arquitectura</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ════════════════════════════════════════════════════════════ -->
    <!-- SIDEBAR                                                     -->
    <!-- ════════════════════════════════════════════════════════════ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <h1>ArchProject</h1>
            <p id="officeName">Silva &amp; Associados</p>
            <div class="sidebar-search">
                <input type="text" placeholder="Pesquisar..." class="search-input" oninput="globalSearch(this.value)">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <div id="searchResults" class="search-results-dropdown"></div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <!-- Painel -->
            <button class="nav-btn active" data-page="painel" onclick="navigate('painel')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span>Painel</span>
            </button>
            <button class="nav-btn" data-page="calendario" onclick="navigate('calendario')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span>Calendário</span>
            </button>

            <!-- Orçamentação -->
            <button class="nav-btn" data-page="orcamentos" onclick="navigate('orcamentos')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                <span>Orçamentação</span>
            </button>

            <!-- Projectos -->
            <button class="nav-btn" data-page="projectos" onclick="navigate('projectos')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
                <span>Projectos</span>
            </button>

            <div class="nav-divider"></div>
            <div class="nav-section-title">Geral</div>

            <!-- Tarefas -->
            <button class="nav-btn" data-page="geral-tarefas" onclick="navigate('geral-tarefas')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                <span>Tarefas & Aprovações</span>
                <span class="nav-badge" id="badgeTarefas" style="display:none">0</span>
            </button>

            <!-- Tempo -->
            <button class="nav-btn" data-page="geral-tempo" onclick="navigate('geral-tempo')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span>Tempo</span>
            </button>

            <!-- Actividade -->
            <button class="nav-btn" data-page="geral-actividade" onclick="navigate('geral-actividade')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                <span>Actividade</span>
            </button>

            <div class="nav-divider"></div>

            <!-- Templates -->
            <button class="nav-btn" data-page="templates" onclick="navigate('templates')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                <span>Templates</span>
            </button>

            <!-- Equipa -->
            <button class="nav-btn" data-page="equipa" onclick="navigate('equipa')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                <span>Equipa</span>
            </button>

            <!-- Configurações -->
            <button class="nav-btn" data-page="configuracoes" onclick="navigate('configuracoes')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                <span>Configurações</span>
            </button>

            <div class="nav-divider"></div>
            <div class="nav-section-title">Portais</div>

            <!-- Portal Cliente -->
            <button class="nav-btn" data-page="portal-cliente" onclick="enterPortal('client')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4-4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span>Portal Cliente</span>
            </button>

            <!-- Portal Externo -->
            <button class="nav-btn" data-page="portal-externo" onclick="enterPortal('external')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
                <span>Portal Externo</span>
            </button>
        </nav>

        <!-- Sidebar footer: current user -->
        <div class="sidebar-footer">
            <div class="avatar" id="userAvatar">MS</div>
            <div class="user-info">
                <div class="user-name" id="userName">Arq. Manuel Silva</div>
                <div class="user-role" id="userRole">Administrador</div>
            </div>
        </div>
    </aside>

    <!-- ════════════════════════════════════════════════════════════ -->
    <!-- MAIN CONTENT                                                -->
    <!-- ════════════════════════════════════════════════════════════ -->
    <main class="main-content" id="mainContent">

        <!-- Timer bar (visible when running) -->
        <div class="timer-bar" id="timerBar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span id="timerProject">—</span>
            <span style="color:#8a8279">·</span>
            <span id="timerPhase">—</span>
            <span class="timer-display" id="timerDisplay">00:00:00</span>
            <button class="timer-btn" onclick="pauseTimer()" id="timerPauseBtn" style="background:#d97706; color:#fff; border:none; padding:6px 14px; font-size:11px; font-weight:700; cursor:pointer; text-transform:uppercase; letter-spacing:0.5px;">Pausar</button>
            <button class="timer-btn stop" onclick="stopTimer()">Parar</button>
        </div>

        <!-- Portal banner -->
        <div class="portal-banner" id="portalBanner">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <span id="portalLabel">Vista de Portal</span>
            <button onclick="exitPortal()">Sair do Portal</button>
        </div>

        <!-- Dynamic content area -->
        <div id="pageContent">
            <!-- Rendered by JavaScript -->
        </div>
    </main>

    <!-- ════════════════════════════════════════════════════════════ -->
    <!-- MODAL (generic, reusable)                                   -->
    <!-- ════════════════════════════════════════════════════════════ -->
    <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
        <div class="modal" id="modalContainer">
            <div class="modal-header">
                <h3 id="modalTitle">Modal</h3>
                <button class="modal-close" onclick="closeModal()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Rendered by JavaScript -->
            </div>
            <div class="modal-footer" id="modalFooter">
                <!-- Rendered by JavaScript -->
            </div>
        </div>
    </div>

    <!-- ════════════════════════════════════════════════════════════ -->
    <!-- TOAST CONTAINER                                             -->
    <!-- ════════════════════════════════════════════════════════════ -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ════════════════════════════════════════════════════════════ -->
    <!-- SCRIPTS                                                     -->
    <!-- ════════════════════════════════════════════════════════════ -->

    <!-- Core data + helpers -->
    <script src="data/utils.js"></script>
    <script src="data/mock.js"></script>
    <script src="data/domain.js"></script>
    <script src="core/constants.js"></script>
    <script src="core/helpers.js"></script>
    <script src="core/access.js"></script>
    <script src="core/state.js"></script>
    <script src="core/persistence.js"></script>
    <script src="core/mutations.js"></script>

    <!-- Feature modules -->
    <script src="modules/quotes/quote-presets.js"></script>
    <script src="modules/quotes/quotes.js"></script>

    <!-- Views -->
    <script src="modules/projects/project-list.js"></script>
    <script src="modules/projects/project-view.js"></script>
    <script src="modules/projects/project-overview.js"></script>
    <script src="modules/projects/project-phases.js"></script>
    <script src="modules/projects/project-documents.js"></script>
    <script src="modules/projects/project-visits.js"></script>
    <script src="modules/projects/project-financials.js"></script>
    <script src="modules/projects/project-time.js"></script>
    <script src="modules/projects/project-time-modal.js"></script>
    <script src="modules/projects/project-pendencias.js"></script>
    <script src="modules/projects/project-messages.js"></script>
    <script src="modules/projects/project-team.js"></script>
    <script src="dashboard.js"></script>
    <script src="app.js"></script>
    <script src="templates.js"></script>
    <script src="equipa.js"></script>
    <script src="portal.js"></script>
    <script src="geral.js"></script>
    <script src="calendario.js"></script>

</body>
</html>
